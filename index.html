<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASO 排名追踪看板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333;}
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { margin: 0; }
        .action-btns { display: flex; gap: 10px; }
        .upload-btn { background-color: #4299e1; color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .upload-btn:hover { background-color: #3182ce; }
        .clear-btn { background-color: #f56565; color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; }
        .clear-btn:hover { background-color: #c53030; }
        input[type="file"] { display: none; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #edf2f7; padding-bottom: 1px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background-color: #edf2f7; border-radius: 5px 5px 0 0; font-weight: bold; color: #4a5568; transition: 0.3s; }
        .tab-btn.active { background-color: #4299e1; color: white; }
        #mainChart { width: 100%; height: 500px; margin-bottom: 30px; display: none; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; white-space: nowrap; }
        th, td { border: 1px solid #e2e8f0; padding: 12px 15px; text-align: left; }
        th { background-color: #edf2f7; font-weight: 600; }
        tr:hover { background-color: #f7fafc; }
        .trend-up { color: #48bb78; font-weight: bold; }
        .trend-down { color: #f56565; font-weight: bold; }
        .empty-state { text-align: center; color: #a0aec0; padding: 50px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📈 ASO 排名追踪看板</h2>
        <div class="action-btns">
            <label for="excelFile" class="upload-btn">➕ 导入新数据 (Excel)</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
            <button class="clear-btn" onclick="clearData()">🗑️ 清空所有缓存</button>
        </div>
    </div>

    <div class="tabs" id="appTabs"></div>
    <div id="mainChart"></div>

    <div class="table-container">
        <table id="dashboardTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state">暂无数据，请使用 Chrome 插件抓取，或点击右上角导入 Excel 文件。</div>
    </div>
</div>

<script>
    // 增加默认空值保护，防止第一次打开报错
    let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]'); 
    let dateColumns = JSON.parse(localStorage.getItem('aso_date_columns') || '[]');
    let currentApp = null; 
    let myChart = null; 

    window.onload = function() {
        // 1. 先尝试读取本地硬盘数据
        if (masterData && masterData.length > 0) {
            updateTabs();
            renderAppView();
        }

        // 2. 检查网址里的空投数据
        const params = new URLSearchParams(window.location.search);
        const autoApp = params.get('app');
        const autoDate = params.get('date');
        const encodedData = params.get('data');

        if (autoApp && autoDate && encodedData) {
            try {
                const jsonStr = decodeURIComponent(atob(encodedData));
                const parsedData = JSON.parse(jsonStr);

                let newData = parsedData.map(item => ({
                    "抓取日期 (Date)": autoDate, 
                    "App名称 (App)": autoApp,
                    "关键词 (Keyword)": item.k,
                    "当日排名 (Rank)": item.r,
                    "7日排名变化": item.c
                }));

                // 清理地址栏
                window.history.replaceState({}, document.title, window.location.pathname);
                mergeAndRender(newData);
                alert(`🎉 成功接收并保存 [${autoApp}] 数据！`);
            } catch (e) {
                alert("❌ 导入数据失败: " + e.message);
            }
        }
    };

    function mergeAndRender(newData) {
        if (!newData || newData.length === 0) return;

        let shortDate = newData[0]["抓取日期 (Date)"];
        let rankColName = `${shortDate} 排名`;
        let uploadedApp = newData[0]["App名称 (App)"];

        if (!dateColumns.includes(rankColName)) {
            dateColumns.push(rankColName);
            dateColumns.sort(); 
        }

        newData.forEach(newRow => {
            const app = newRow["App名称 (App)"];
            const keyword = newRow["关键词 (Keyword)"];
            const rank = newRow["当日排名 (Rank)"];
            const change = newRow["7日排名变化"];

            let existingRow = masterData.find(r => r["App名称 (App)"] === app && r["关键词 (Keyword)"] === keyword);

            if (existingRow) {
                existingRow[rankColName] = rank;
                existingRow["7日排名变化"] = change;
            } else {
                let obj = {
                    "App名称 (App)": app,
                    "关键词 (Keyword)": keyword,
                    [rankColName]: rank,
                    "7日排名变化": change
                };
                masterData.push(obj);
            }
        });

        localStorage.setItem('aso_master_data', JSON.stringify(masterData));
        localStorage.setItem('aso_date_columns', JSON.stringify(dateColumns));

        currentApp = uploadedApp;
        updateTabs();
        renderAppView();
    }

    function updateTabs() {
        const tabsContainer = document.getElementById('appTabs');
        tabsContainer.innerHTML = '';
        const apps = [...new Set(masterData.map(row => row["App名称 (App)"]))];
        if (apps.length === 0) return;
        if (!currentApp || !apps.includes(currentApp)) currentApp = apps[0];

        apps.forEach(app => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${app === currentApp ? 'active' : ''}`;
            btn.textContent = app;
            btn.onclick = () => { currentApp = app; updateTabs(); renderAppView(); };
            tabsContainer.appendChild(btn);
        });
    }

    function renderAppView() {
        document.getElementById('emptyState').style.display = 'none';
        const currentAppData = masterData.filter(row => row["App名称 (App)"] === currentApp);
        renderTable(currentAppData);
        renderMainChart(currentAppData);
    }

    function renderTable(appData) {
        const displayColumns = ["App名称 (App)", "关键词 (Keyword)", ...dateColumns, "7日排名变化"];
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        thead.innerHTML = '';
        const headerRow = document.createElement('tr');
        displayColumns.forEach(col => { const th = document.createElement('th'); th.textContent = col; headerRow.appendChild(th); });
        thead.appendChild(headerRow);

        tbody.innerHTML = ''; 
        appData.forEach(row => {
            const tr = document.createElement('tr');
            displayColumns.forEach(col => {
                const td = document.createElement('td');
                let cellValue = row[col] !== undefined && row[col] !== "" ? row[col] : '-';
                if (col === "7日排名变化" && cellValue !== '-') {
                    let strVal = String(cellValue).trim();
                    if (strVal.includes('↑') || parseFloat(strVal) > 0) td.classList.add('trend-up');
                    else if (strVal.includes('↓') || parseFloat(strVal) < 0) td.classList.add('trend-down');
                }
                td.textContent = cellValue;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function renderMainChart(appData) {
        const chartDom = document.getElementById('mainChart');
        if (dateColumns.length > 0) { chartDom.style.display = 'block'; } 
        else { chartDom.style.display = 'none'; return; }
        if (!myChart) myChart = echarts.init(chartDom);
        myChart.clear();

        const xAxisData = dateColumns.map(col => col.replace(' 排名', ''));
        const legendData = appData.map(row => row['关键词 (Keyword)']);
        const seriesData = appData.map(row => ({
            name: row['关键词 (Keyword)'],
            type: 'line',
            data: dateColumns.map(col => (row[col] && row[col] !== '-') ? parseInt(row[col]) : null)
        }));

        myChart.setOption({
            title: { text: `[${currentApp}] 关键词排名动态走势`, left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: { type: 'scroll', bottom: 0, data: legendData },
            xAxis: { type: 'category', data: xAxisData },
            yAxis: { type: 'value', inverse: true },
            series: seriesData
        });
    }

    function clearData() {
        if(confirm("警告：确定要清空所有数据吗？")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>

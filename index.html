<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ASO 动态监控看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f7fafc; }
        .control-panel { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .filter-area { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <h2>📈 ASO 动态监控看板</h2>
    <div class="control-panel">
        <button onclick="localStorage.clear(); location.reload();" style="background:#feb2b2; border:none; padding:8px; cursor:pointer;">⚠️ 清空所有数据</button>
        <div id="filterList" class="filter-area"></div>
    </div>
    
    <div id="chartContainer" style="width: 100%; height: 400px;"></div>
    <table id="dataTable">
        <thead><tr><th>App</th><th>Keyword</th><th>Rank</th><th>Date</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    let chart = echarts.init(document.getElementById('chartContainer'));
    let selectedKeywords = JSON.parse(localStorage.getItem('selected_kws') || '[]');

    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');

        if (encodedData) {
            const newData = JSON.parse(decodeURIComponent(encodedData));
            let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
            masterData = [...masterData, ...newData];
            localStorage.setItem('aso_master_data', JSON.stringify(masterData));
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        renderDashboard();
    });

    function renderDashboard() {
        const data = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
        const allKeywords = [...new Set(data.map(d => d.Keyword))];
        
        // 1. 渲染筛选框
        const filterEl = document.getElementById('filterList');
        filterEl.innerHTML = allKeywords.map(k => `
            <label style="background:#e2e8f0; padding:4px 8px; border-radius:4px; cursor:pointer;">
                <input type="checkbox" ${selectedKeywords.includes(k) ? 'checked' : ''} onchange="toggleKeyword('${k}')"> ${k}
            </label>`).join('');

        // 2. 渲染表格
        const filteredData = selectedKeywords.length > 0 ? data.filter(d => selectedKeywords.includes(d.Keyword)) : data;
        document.getElementById('tableBody').innerHTML = filteredData.map(row => 
            `<tr><td>${row.App}</td><td>${row.Keyword}</td><td>${row.Rank}</td><td>${row.Date}</td></tr>`
        ).join('');

        // 3. 渲染图表
        const dates = [...new Set(filteredData.map(d => d.Date))].sort();
        const series = selectedKeywords.map(kw => ({
            name: kw, type: 'line', 
            data: dates.map(date => {
                const entry = filteredData.find(d => d.Keyword === kw && d.Date === date);
                return entry ? parseInt(entry.Rank) : null;
            })
        }));

        chart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: selectedKeywords },
            xAxis: { type: 'category', data: dates },
            yAxis: { type: 'value', inverse: true },
            series: series
        });
    }

    function toggleKeyword(kw) {
        if(selectedKeywords.includes(kw)) selectedKeywords = selectedKeywords.filter(k => k !== kw);
        else selectedKeywords.push(kw);
        localStorage.setItem('selected_kws', JSON.stringify(selectedKeywords));
        renderDashboard();
    }
</script>
</body>
</html>

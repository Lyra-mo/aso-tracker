<!-- index.html - 完整核心脚本部分 -->
<script>
    let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
    let currentApp = localStorage.getItem('last_selected_app') || "";
    let activeKeys = JSON.parse(localStorage.getItem('active_keys') || '[]');

    function renderTable() {
        const appData = masterData.filter(d => d.App === currentApp);
        const allKeys = [...new Set(appData.map(d => d.Keyword))];
        
        // 1. 渲染筛选框
        document.getElementById('filterList').innerHTML = allKeys.map(k => 
            `<label style="margin-right:10px;"><input type="checkbox" ${activeKeys.includes(k) ? 'checked' : ''} onchange="toggleKey('${k}')"> ${k}</label>`
        ).join('');

        // 2. 过滤数据
        const filteredData = appData.filter(d => activeKeys.includes(d.Keyword));
        if (filteredData.length === 0) return;

        // 3. 渲染表格
        const keys = Array.from(new Set(filteredData.flatMap(Object.keys)));
        document.getElementById('tableHead').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
        document.getElementById('tableBody').innerHTML = filteredData.map(row => 
            `<tr>${keys.map(k => `<td>${row[k] || '-'}</td>`).join('')}</tr>`
        ).join('');
        
        // 4. 绘制图表
        const chart = echarts.init(document.getElementById('chartContainer'));
        const rankKeys = keys.filter(k => k.startsWith('Rank '));
        chart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: rankKeys.map(k => k.replace('Rank ', '')) },
            yAxis: { type: 'value', inverse: true },
            series: filteredData.map(d => ({ name: d.Keyword, type: 'line', data: rankKeys.map(k => d[k] || null) }))
        });
    }

    function toggleKey(key) {
        if(activeKeys.includes(key)) activeKeys = activeKeys.filter(k => k !== key);
        else activeKeys.push(key);
        localStorage.setItem('active_keys', JSON.stringify(activeKeys));
        renderTable();
    }

    function deleteCurrentApp() {
        if (confirm(`确定删除 ${currentApp}？`)) {
            masterData = masterData.filter(d => d.App !== currentApp);
            localStorage.setItem('aso_master_data', JSON.stringify(masterData));
            location.reload();
        }
    }

    function resetDashboard() {
        if(confirm("确定清空所有数据？")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = renderTable;
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ASO 动态监控看板</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f7fafc; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h2>📈 ASO 动态监控看板</h2>
    <button onclick="localStorage.clear(); location.reload();">⚠️ 清空所有数据</button>
    <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');

        if (encodedData) {
            try {
                // 直接使用 decodeURIComponent 解析
                const decoded = decodeURIComponent(encodedData);
                const newData = JSON.parse(decoded);
                
                let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
                masterData = masterData.concat(newData);
                localStorage.setItem('aso_master_data', JSON.stringify(masterData));
                
                // 清理 URL 参数
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (e) {
                console.error("解析错误:", e);
                alert("数据解析失败: " + e.message);
            }
        }
        renderTable();
    });

    function renderTable() {
        const masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
        if (masterData.length === 0) return;

        const keys = ["App", "Keyword", "Rank", "Date"];
        document.getElementById('tableHead').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
        document.getElementById('tableBody').innerHTML = masterData.map(row => 
            `<tr>${keys.map(k => `<td>${row[k] || '-'}</td>`).join('')}</tr>`
        ).join('');
    }
</script>
</body>
</html>

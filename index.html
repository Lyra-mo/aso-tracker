<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ASO 动态监控看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f7fafc; }
        .control-panel { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
    </style>
</head>
<body>
    <h2>📈 ASO 动态监控看板</h2>
    <div class="control-panel">
        <button onclick="localStorage.clear(); location.reload();" style="background:#feb2b2; border:none; padding:10px 20px; cursor:pointer;">⚠️ 清空所有数据</button>
    </div>
    
    <div id="chartContainer" style="width: 100%; height: 400px;"></div>
    
    <table id="dataTable">
        <thead>
            <tr><th>勾选</th><th>App</th><th>Keyword</th><th>Rank</th><th>Date</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    let chart = echarts.init(document.getElementById('chartContainer'));
    // 存储选中的“App-Keyword”组合
    let selectedItems = JSON.parse(localStorage.getItem('selected_items') || '[]');

    window.addEventListener('DOMContentLoaded', () => {
        // 数据处理逻辑保持不变
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');
        if (encodedData) {
            let newData = JSON.parse(decodeURIComponent(encodedData));
            let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
            let map = new Map(masterData.map(i => [`${i.App}-${i.Keyword}-${i.Date}`, i]));
            newData.forEach(i => map.set(`${i.App}-${i.Keyword}-${i.Date}`, i));
            localStorage.setItem('aso_master_data', JSON.stringify(Array.from(map.values())));
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        renderDashboard();
    });

    function renderDashboard() {
        const data = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
        // 拿到当前所有唯一的关键词组合
        const uniqueEntries = Array.from(new Map(data.map(d => [`${d.App}-${d.Keyword}`, d])).values());

        // 渲染表格：表格里直接包含勾选框
        document.getElementById('tableBody').innerHTML = uniqueEntries.map(entry => {
            const key = `${entry.App}-${entry.Keyword}`;
            const isChecked = selectedItems.includes(key);
            return `<tr>
                <td><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleItem('${key}')"></td>
                <td>${entry.App}</td>
                <td>${entry.Keyword}</td>
                <td>${entry.Rank}</td>
                <td>${entry.Date}</td>
            </tr>`;
        }).join('');

        // 筛选选中数据并绘图
        const filteredData = data.filter(d => selectedItems.includes(`${d.App}-${d.Keyword}`));
        updateChart(filteredData);
    }

    function toggleItem(key) {
        if(selectedItems.includes(key)) selectedItems = selectedItems.filter(k => k !== key);
        else selectedItems.push(key);
        localStorage.setItem('selected_items', JSON.stringify(selectedItems));
        renderDashboard();
    }

    function updateChart(data) {
        const dates = [...new Set(data.map(d => d.Date))].sort();
        const seriesMap = data.reduce((acc, curr) => {
            let key = `${curr.App}:${curr.Keyword}`;
            if (!acc[key]) acc[key] = { name: key, type: 'line', data: new Array(dates.length).fill(null) };
            let idx = dates.indexOf(curr.Date);
            acc[key].data[idx] = parseInt(curr.Rank);
            return acc;
        }, {});

        chart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { show: false }, // 完全隐藏图表上方的图例，保持画面干净
            xAxis: { type: 'category', data: dates },
            yAxis: { type: 'value', inverse: true, name: '排名' },
            series: Object.values(seriesMap)
        }, true);
    }
</script>
</body>
</html>

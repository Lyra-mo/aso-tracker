<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ASO 动态监控看板</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f7fafc; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h2>📈 ASO 动态监控看板</h2>
    <button onclick="localStorage.clear(); location.reload();">⚠️ 清空所有数据</button>
    <table id="dataTable">
        <thead id="tableHead"><tr><th>App</th><th>Keyword</th><th>Rank</th><th>Date</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');

        if (encodedData) {
            try {
                const newData = JSON.parse(decodeURIComponent(encodedData));
                let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
                
                // 合并数据并去重
                masterData = [...new Map([...masterData, ...newData].map(item => [item.Keyword, item])).values()];
                localStorage.setItem('aso_master_data', JSON.stringify(masterData));
                
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (e) { alert("解析失败: " + e.message); }
        }
        renderTable();
    });

    function renderTable() {
        const data = JSON.parse(localStorage.getItem('aso_master_data') || '[]');
        document.getElementById('tableBody').innerHTML = data.map(row => 
            `<tr><td>${row.App}</td><td>${row.Keyword}</td><td>${row.Rank}</td><td>${row.Date}</td></tr>`
        ).join('');
    }
</script>
</body>
</html>

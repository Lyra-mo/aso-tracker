<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>ASO 排名看板</title></head>
<body style="font-family: sans-serif; padding: 20px;">
    <h2>📈 ASO 动态监控宽表</h2>
    <div id="appTabs" style="margin-bottom: 20px;"></div>
    <table id="dataTable" border="1" style="border-collapse: collapse; width: 100%;">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    let masterData = JSON.parse(localStorage.getItem('aso_master_data') || '[]');

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');
        if (encodedData) {
            const newData = JSON.parse(decodeURIComponent(atob(encodedData)));
            mergeAndRender(newData);
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            renderTable();
        }
    };

    function mergeAndRender(newData) {
        newData.forEach(newRow => {
            let existing = masterData.find(r => r.App === newRow.App && r.Keyword === newRow.Keyword);
            if (existing) {
                // 关键点：动态添加日期列
                existing[`Rank ${newRow.Date}`] = newRow.Rank;
                existing["Change"] = newRow.Change;
            } else {
                masterData.push({
                    "App": newRow.App,
                    "Keyword": newRow.Keyword,
                    [`Rank ${newRow.Date}`]: newRow.Rank,
                    "Change": newRow.Change
                });
            }
        });
        localStorage.setItem('aso_master_data', JSON.stringify(masterData));
        renderTable();
    }

    function renderTable() {
        if (masterData.length === 0) return;
        const keys = Array.from(new Set(masterData.flatMap(Object.keys)));
        document.getElementById('tableHead').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
        document.getElementById('tableBody').innerHTML = masterData.map(row => 
            `<tr>${keys.map(k => `<td>${row[k] || '-'}</td>`).join('')}</tr>`
        ).join('');
    }
</script>
</body>
</html>
